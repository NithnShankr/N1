<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Empty Project</title>

    <meta itemprop="name" content="Empty Project">
    <meta name="twitter:title" content="Empty Project">
    <meta property="og:title" content="Empty Project">

    <meta name="description" content="Start with a blank project.">
    <meta itemprop="description" content="Start with a blank project.">
    <meta property="og:description" content="Start with a blank project.">
    <meta name="twitter:description" content="Start with a blank project.">

    <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
    <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam"></script>

    <style>
        #uploadBtn {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 14px 22px;
            border: none;
            border-radius: 12px;
            background: #6c47ff;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <button id="uploadBtn">Upload Photo</button>
    <input id="fileInput" type="file" accept="image/*" style="display:none;" />

    <script src="bundle.js"></script>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js'
        import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-storage.js'

            // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBig4hY99jniHqYOCJX4Nb7di41eUlAqq8",
  authDomain: "novo-b4706.firebaseapp.com",
  projectId: "novo-b4706",
  storageBucket: "novo-b4706.firebasestorage.app",
  messagingSenderId: "167456023306",
  appId: "1:167456023306:web:435abe1a1905703d5290f3",
  measurementId: "G-6CL5V3MZG0"
};

        const app = initializeApp(firebaseConfig)
        const storage = getStorage(app)

        window.addEventListener('DOMContentLoaded', () => {
            const uploadBtn = document.getElementById('uploadBtn')
            const fileInput = document.getElementById('fileInput')

            if (!uploadBtn || !fileInput) {
                console.warn('Upload elements not found')
                return
            }

            uploadBtn.addEventListener('click', () => {
                fileInput.click()
            })

            fileInput.addEventListener('change', async (event) => {
                const file = event.target.files[0]
                if (!file) return

                try {
                    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_')
                    const uniqueName = `${Date.now()}_${safeName}`
                    const storageRef = ref(storage, `uploads/${uniqueName}`)

                    await uploadBytes(storageRef, file)
                    const downloadURL = await getDownloadURL(storageRef)

                    console.log('Upload success:', downloadURL)
                    alert('Upload complete ✅')
                } catch (err) {
                    console.error(err)
                    alert('Upload failed ❌')
                }
            })
        })
    </script>

</body>

</html>
